<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>얼리버드 이벤트🐦</title>
<link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131a;
    --border: #2a2a3a;
    --accent: #f0c040;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #888;
    --success: #4ade80;
    --fail: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh; display: flex;
    flex-direction: column; align-items: center;
    justify-content: center; padding: 20px; overflow-x: hidden;
  }
  .bg-glow {
    position: fixed; top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(240,192,64,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:.5; transform:translateX(-50%) scale(1); }
    50% { opacity:1; transform:translateX(-50%) scale(1.1); }
  }
  .container { position:relative; z-index:1; width:100%; max-width:480px; }

  .header { text-align:center; margin-bottom:32px; }
  .header .tag {
    display:inline-block; background:var(--accent); color:#000;
    font-size:11px; font-weight:700; letter-spacing:2px;
    padding:4px 12px; border-radius:20px; margin-bottom:16px; text-transform:uppercase;
  }
  .header h1 {
    font-family:'Gamja Flower',sans-serif;
    font-size:clamp(32px,8vw,52px); line-height:1.1; letter-spacing:-1px;
  }
  .header h1 span { color:var(--accent); }
  .header p { color:var(--muted); font-size:14px; margin-top:10px; line-height:1.6; }

  .timer-bar {
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:20px 24px; margin-bottom:20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .timer-label { font-size:12px; color:var(--muted); }
  .timer-value { font-family:'Gamja Flower',sans-serif; font-size:28px; color:var(--accent); letter-spacing:2px; }
  .status-dot {
    width:10px; height:10px; border-radius:50%;
    background:var(--success); box-shadow:0 0 8px var(--success);
    animation:blink 1.5s ease-in-out infinite;
  }
  .status-dot.inactive { background:var(--fail); box-shadow:0 0 8px var(--fail); animation:none; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

  .slots-bar {
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:20px 24px; margin-bottom:20px;
  }
  .slots-info { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px; }
  .slots-label { font-size:13px; color:var(--muted); }
  .slots-count { font-family:'Gamja Flower',sans-serif; font-size:22px; }
  .slots-count .remain { color:var(--accent); }
  .slots-count .total { color:var(--muted); font-size:14px; }
  .progress-track { height:8px; background:var(--border); border-radius:99px; overflow:hidden; }
  .progress-fill {
    height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2));
    border-radius:99px; transition:width .5s ease;
  }

  .form-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:20px; padding:28px 24px; margin-bottom:20px;
  }
  .form-card h2 { font-family:'Gamja Flower',sans-serif; font-size:20px; margin-bottom:20px; }
  .input-group { margin-bottom:16px; }
  .input-group label { display:block; font-size:12px; color:var(--muted); margin-bottom:8px; }
  .input-group input, .input-group select {
    width:100%; background:var(--bg); border:1.5px solid var(--border);
    border-radius:10px; padding:14px 16px; color:var(--text);
    font-size:16px; font-family:'Noto Sans KR',sans-serif;
    outline:none; transition:border-color .2s; -webkit-appearance:none;
  }
  .input-group input:focus, .input-group select:focus { border-color:var(--accent); }
  .input-group select option { background:var(--card); }

  .submit-btn {
    width:100%; background:var(--accent); color:#000; border:none;
    border-radius:12px; padding:16px;
    font-family:'Gamja Flower',sans-serif; font-size:18px;
    cursor:pointer; transition:all .2s; letter-spacing:1px; margin-top:4px;
  }
  .submit-btn:hover { background:#f5d060; transform:translateY(-1px); }
  .submit-btn:active { transform:translateY(0); }
  .submit-btn:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; transform:none; }

  .loading-spinner {
    display:inline-block; width:16px; height:16px;
    border:2px solid #000; border-top-color:transparent;
    border-radius:50%; animation:spin .6s linear infinite; margin-right:8px;
    vertical-align:middle;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .result-screen {
    display:none; text-align:center; padding:40px 24px;
    background:var(--card); border:1px solid var(--border);
    border-radius:20px; margin-bottom:20px;
  }
  .result-screen.show { display:block; animation:fadeIn .4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .result-icon { font-size:64px; margin-bottom:16px; }
  .result-title { font-family:'Gamja Flower',sans-serif; font-size:28px; margin-bottom:10px; }
  .result-title.win { color:var(--accent); }
  .result-title.lose { color:var(--muted); }
  .result-msg { font-size:14px; color:var(--muted); line-height:1.7; }
  .result-rank {
    display:inline-block; background:var(--accent); color:#000;
    font-family:'Gamja Flower',sans-serif; font-size:32px;
    padding:10px 28px; border-radius:12px; margin:16px 0;
  }

  /* 관리자 */
  .admin-toggle { text-align:center; margin-bottom:10px; }
  .admin-toggle button {
    background:none; border:1px solid var(--border); color:var(--muted);
    font-size:12px; padding:6px 16px; border-radius:20px;
    cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all .2s;
  }
  .admin-toggle button:hover { border-color:var(--accent); color:var(--accent); }
  .admin-panel {
    display:none; background:var(--card); border:1.5px solid var(--accent);
    border-radius:20px; padding:24px; margin-bottom:20px;
  }
  .admin-panel.show { display:block; animation:fadeIn .3s ease; }
  .admin-panel h3 { font-family:'Gamja Flower',sans-serif; font-size:16px; color:var(--accent); margin-bottom:20px; }

  .admin-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
  .admin-input-group label { display:block; font-size:11px; color:var(--muted); margin-bottom:6px; }
  .admin-input-group input {
    width:100%; background:var(--bg); border:1px solid var(--border);
    border-radius:8px; padding:10px 12px; color:var(--text);
    font-size:14px; font-family:'Noto Sans KR',sans-serif; outline:none;
  }
  .admin-input-group input:focus { border-color:var(--accent); }
  .admin-btn {
    width:100%; background:transparent; border:1.5px solid var(--accent);
    color:var(--accent); border-radius:10px; padding:12px;
    font-family:'Gamja Flower',sans-serif; font-size:14px;
    cursor:pointer; margin-top:8px; transition:all .2s; letter-spacing:1px;
  }
  .admin-btn:hover { background:var(--accent); color:#000; }
  .admin-btn.danger { border-color:var(--fail); color:var(--fail); }
  .admin-btn.danger:hover { background:var(--fail); color:#fff; }

  .winner-list { margin-top:20px; border-top:1px solid var(--border); padding-top:16px; }
  .winner-list h4 { font-size:12px; color:var(--muted); margin-bottom:12px; letter-spacing:1px; }
  .winner-item {
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 0; border-bottom:1px solid var(--border); font-size:13px;
  }
  .rank-badge {
    background:var(--accent); color:#000; font-family:'Gamja Flower',sans-serif;
    font-size:12px; padding:2px 8px; border-radius:6px; min-width:36px; text-align:center;
  }
  .winner-item .name { flex:1; padding:0 12px; font-weight:600; }
  .winner-item .info { color:var(--muted); font-size:12px; }
  .empty-list { color:var(--muted); font-size:13px; text-align:center; padding:20px 0; }

  .url-setup {
    background:var(--card); border:2px dashed var(--accent);
    border-radius:20px; padding:28px 24px; margin-bottom:20px; text-align:center;
  }
  .url-setup h3 { font-family:'Gamja Flower',sans-serif; font-size:18px; color:var(--accent); margin-bottom:12px; }
  .url-setup p { font-size:13px; color:var(--muted); margin-bottom:16px; line-height:1.7; }
  .url-setup input {
    width:100%; background:var(--bg); border:1.5px solid var(--border);
    border-radius:10px; padding:14px 16px; color:var(--text);
    font-size:13px; font-family:'Noto Sans KR',sans-serif; outline:none;
    margin-bottom:12px;
  }
  .url-setup input:focus { border-color:var(--accent); }
  .url-setup button {
    width:100%; background:var(--accent); color:#000; border:none;
    border-radius:10px; padding:14px;
    font-family:'Gamja Flower',sans-serif; font-size:16px; cursor:pointer;
  }

  .toast {
    position:fixed; bottom:30px; left:50%;
    transform:translateX(-50%) translateY(80px);
    background:var(--card); border:1px solid var(--border);
    color:var(--text); padding:12px 24px; border-radius:12px;
    font-size:14px; z-index:999; transition:transform .3s ease; white-space:nowrap;
  }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:var(--success); color:var(--success); }
  .toast.error { border-color:var(--fail); color:var(--fail); }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">

  <!-- URL 초기 설정 (최초 1회) -->
  <div class="url-setup" id="urlSetup">
    <h3>⚙️ 최초 설정</h3>
    <p>Apps Script 배포 후 받은<br><strong style="color:var(--text)">웹 앱 URL</strong>을 입력해주세요<br><span style="font-size:11px">(이후 자동 저장됩니다)</span></p>
    <input type="text" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/...">
    <button onclick="saveScriptUrl()">저장하고 시작</button>
  </div>

  <!-- 메인 (URL 설정 후 표시) -->
  <div id="mainContent" style="display:none; width:100%">

    <div class="header">
      <div class="tag">🐦Early Bird Event🐦</div>
      <h1>얼리버드<br><span>이벤트</span></h1>
      <p>QR코드를 발견했다면 지금 바로 참여하세요<br>선착순 <strong id="headerLimit" style="color:var(--accent)">10</strong>명에게 <span id="headerPrize">구글플레이 상품권</span> 증정!</p>
    </div>

    <div class="timer-bar">
      <div>
        <div class="timer-label">이벤트 마감까지</div>
        <div class="timer-value" id="timerDisplay">--:--</div>
      </div>
      <div style="text-align:right">
        <div class="timer-label" id="statusLabel">로딩 중...</div>
        <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end;margin-top:6px">
          <div class="status-dot inactive" id="statusDot"></div>
        </div>
      </div>
    </div>

    <div class="slots-bar">
      <div class="slots-info">
        <span class="slots-label">남은 당첨 자리</span>
        <div class="slots-count">
          <span class="remain" id="remainCount">--</span>
          <span class="total"> / <span id="totalCount">--</span>명</span>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="form-card" id="formCard">
      <h2>🎯 지금 참여하기</h2>
      <div class="input-group">
        <label>학과</label>
        <select id="deptInput">
          <option value="">학과 선택</option>
        </select>
      </div>
      <div class="input-group">
        <label>학년</label>
        <select id="gradeInput">
          <option value="">학년 선택</option>
          <option value="1">1학년</option>
          <option value="2">2학년</option>
          <option value="3">3학년</option>
        </select>
      </div>
      <div class="input-group">
        <label>반</label>
        <select id="classInput">
          <option value="">반 선택</option>
          <option value="1">1반</option>
          <option value="2">2반</option>
          <option value="3">3반</option>
        </select>
      </div>
      <div class="input-group">
        <label>번호</label>
        <input type="number" id="numberInput" placeholder="출석 번호" min="1" max="25">
      </div>
      <div class="input-group">
        <label>이름</label>
        <input type="text" id="nameInput" placeholder="이름 입력">
      </div>
      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()" disabled>로딩 중...</button>
    </div>

    <div class="result-screen" id="resultScreen">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-title" id="resultTitle"></div>
      <div id="resultRank"></div>
      <div class="result-msg" id="resultMsg"></div>
    </div>

    <!-- 관리자 -->
    <div class="admin-toggle">
      <button onclick="toggleAdmin()">⚙️ 관리자</button>
    </div>
    <div class="admin-panel" id="adminPanel">
      <h3>⚙ 관리자 패널</h3>
      <div class="admin-row" style="grid-template-columns:1fr">
        <div class="admin-input-group">
          <label>관리자 비밀번호</label>
          <input type="password" id="adminPw" placeholder="비밀번호 입력 후 명단 조회">
        </div>
      </div>
      <button class="admin-btn" onclick="loadWinners()">당첨자 명단 불러오기</button>
      <div style="margin-top:16px; padding:12px; background:var(--bg); border-radius:10px; font-size:12px; color:var(--muted); line-height:1.8;">
        ⚙️ 시작/종료 시각, 선착순 인원, 학과 목록 변경은<br>
        <strong style="color:var(--accent)">Apps Script 코드 상단 CONFIG</strong>에서 수정 후 재배포
      </div>
      <button class="admin-btn" style="margin-top:12px" onclick="resetScriptUrl()">Apps Script URL 재설정</button>
      <div class="winner-list">
        <h4>🏆 당첨자 명단</h4>
        <div id="winnerList"><div class="empty-list">비밀번호 입력 후 조회하세요</div></div>
      </div>
    </div>

  </div><!-- /mainContent -->
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'earlyBirdScriptUrl';
  const DEPT_LIST = ['로봇기계시스템과','기계과','로봇소재융합과','산업설비과','반도체과','자동차과','전기과','건축토목과'];
  // ↑ 학과 목록은 여기서 수정 (Apps Script CONFIG와 동일하게)

  let scriptUrl = '';
  let serverStatus = null;

  // =====================
  // 초기화
  // =====================
  function init() {
    scriptUrl = localStorage.getItem(STORAGE_KEY) || '';
    if (scriptUrl) {
      showMain();
    } else {
      document.getElementById('urlSetup').style.display = 'block';
      document.getElementById('mainContent').style.display = 'none';
    }
  }

  function saveScriptUrl() {
    const url = document.getElementById('scriptUrlInput').value.trim();
    if (!url.startsWith('https://script.google.com')) {
      showToast('올바른 Apps Script URL을 입력해주세요', 'error');
      return;
    }
    localStorage.setItem(STORAGE_KEY, url);
    scriptUrl = url;
    showMain();
  }

  function resetScriptUrl() {
    if (!confirm('Apps Script URL을 초기화할까요?')) return;
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }

  function showMain() {
    document.getElementById('urlSetup').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    renderDeptOptions();
    fetchStatus();
    setInterval(fetchStatus, 10000); // 10초마다 상태 갱신
    setInterval(updateTimer, 1000);
  }

  // =====================
  // 학과 렌더링
  // =====================
  function renderDeptOptions() {
    const sel = document.getElementById('deptInput');
    sel.innerHTML = '<option value="">학과 선택</option>' +
      DEPT_LIST.map(d => `<option value="${d}">${d}</option>`).join('');
  }

  // =====================
  // 서버 상태 조회
  // =====================
  async function fetchStatus() {
    try {
      const res = await fetch(`${scriptUrl}?action=status`);
      const data = await res.json();
      if (data.ok) {
        serverStatus = data;
        updateUI(data);
      }
    } catch(e) {
      document.getElementById('statusLabel').textContent = '연결 오류';
    }
  }

  function updateUI(data) {
    document.getElementById('headerLimit').textContent = data.limit;
    document.getElementById('headerPrize').textContent = data.prize;
    document.getElementById('remainCount').textContent = data.remain;
    document.getElementById('totalCount').textContent = data.limit;
    const pct = data.limit > 0 ? ((data.limit - data.remain) / data.limit) * 100 : 0;
    document.getElementById('progressFill').style.width = pct + '%';

    const btn = document.getElementById('submitBtn');
    if (data.over) {
      btn.disabled = true; btn.textContent = '이벤트가 종료되었습니다';
    } else if (!data.active) {
      btn.disabled = true; btn.textContent = `${data.startTime} 시작 예정`;
    } else if (data.remain <= 0) {
      btn.disabled = true; btn.textContent = '선착순 마감!';
    } else {
      btn.disabled = false; btn.textContent = '참여하기 →';
    }
  }

  // =====================
  // 타이머
  // =====================
  function updateTimer() {
    if (!serverStatus) return;
    const now = new Date();
    const [sh, sm] = serverStatus.startTime.split(':').map(Number);
    const [eh, em] = serverStatus.endTime.split(':').map(Number);
    const start = new Date(); start.setHours(sh, sm, 0, 0);
    const end   = new Date(); end.setHours(eh, em, 0, 0);
    const dot   = document.getElementById('statusDot');
    const label = document.getElementById('statusLabel');
    const timer = document.getElementById('timerDisplay');

    if (now < start) {
      const diff = start - now;
      const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
      timer.textContent = `${pad(m)}:${pad(s)}`;
      label.textContent = '시작 전'; dot.className = 'status-dot inactive';
    } else if (now <= end) {
      const diff = end - now;
      const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
      timer.textContent = `${pad(m)}:${pad(s)}`;
      label.textContent = '진행 중!'; dot.className = 'status-dot';
    } else {
      timer.textContent = '00:00';
      label.textContent = '종료'; dot.className = 'status-dot inactive';
    }
  }
  const pad = n => String(n).padStart(2,'0');

  // =====================
  // 참여 처리
  // =====================
  async function handleSubmit() {
    const dept  = document.getElementById('deptInput').value;
    const grade = document.getElementById('gradeInput').value;
    const cls   = document.getElementById('classInput').value;
    const num   = document.getElementById('numberInput').value.trim();
    const name  = document.getElementById('nameInput').value.trim();

    if (!dept || !grade || !cls || !num || !name) {
      showToast('모든 항목을 입력해주세요', 'error'); return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span>처리 중...';

    try {
      const url = `${scriptUrl}?action=join&dept=${encodeURIComponent(dept)}&grade=${grade}&cls=${cls}&num=${num}&name=${encodeURIComponent(name)}`;
      const res  = await fetch(url);
      const data = await res.json();

      if (data.ok) {
        document.getElementById('formCard').style.display = 'none';
        showResult(true, data.rank, data.name, data.prize);
        fetchStatus();
      } else {
        if (data.error === 'FULL') {
          document.getElementById('formCard').style.display = 'none';
          showResult(false);
        } else if (data.error === 'DUPLICATE') {
          showToast('이미 참여한 학생이에요!', 'error');
          btn.disabled = false; btn.textContent = '참여하기 →';
        } else {
          showToast(data.message || data.error, 'error');
          btn.disabled = false; btn.textContent = '참여하기 →';
        }
      }
    } catch(e) {
      showToast('서버 연결 오류. 다시 시도해주세요', 'error');
      btn.disabled = false; btn.textContent = '참여하기 →';
    }
  }

  function showResult(won, rank, name, prize) {
    const screen = document.getElementById('resultScreen');
    screen.classList.add('show');
    if (won) {
      document.getElementById('resultIcon').textContent = '🎉';
      document.getElementById('resultTitle').textContent = '당첨!';
      document.getElementById('resultTitle').className = 'result-title win';
      document.getElementById('resultRank').innerHTML = `<div class="result-rank">${rank}등 🏆</div>`;
      document.getElementById('resultMsg').innerHTML = `
        <strong style="color:var(--text)">${name}</strong> 학생, 축하해요!<br>
        <strong style="color:var(--accent)">${prize}</strong>에 당첨되었습니다.<br><br>
        담당 선생님에게 이 화면을 보여주세요 📱
      `;
    } else {
      document.getElementById('resultIcon').textContent = '😢';
      document.getElementById('resultTitle').textContent = '아쉽게도 마감!';
      document.getElementById('resultTitle').className = 'result-title lose';
      document.getElementById('resultRank').innerHTML = '';
      document.getElementById('resultMsg').innerHTML = `
        선착순이 모두 마감됐어요.<br>다음 달 이벤트를 기대해주세요!<br><br>
        <span style="color:var(--accent)">일찍 올수록 찬스가 커져요 🌅</span>
      `;
    }
  }

  // =====================
  // 관리자
  // =====================
  function toggleAdmin() {
    document.getElementById('adminPanel').classList.toggle('show');
  }

  async function loadWinners() {
    const pw = document.getElementById('adminPw').value;
    if (!pw) { showToast('비밀번호를 입력해주세요', 'error'); return; }

    const el = document.getElementById('winnerList');
    el.innerHTML = '<div class="empty-list">불러오는 중...</div>';

    try {
      const res  = await fetch(`${scriptUrl}?action=winners&pw=${encodeURIComponent(pw)}`);
      const data = await res.json();
      if (!data.ok) { showToast(data.error, 'error'); el.innerHTML = '<div class="empty-list">조회 실패</div>'; return; }
      if (data.winners.length === 0) { el.innerHTML = '<div class="empty-list">아직 당첨자가 없습니다</div>'; return; }
      el.innerHTML = data.winners.map(w => `
        <div class="winner-item">
          <span class="rank-badge">${w.rank}등</span>
          <span class="name">${w.name}</span>
          <span class="info">${w.dept} ${w.grade}학년 ${w.cls}반 ${w.num}번</span>
        </div>
      `).join('');
    } catch(e) {
      showToast('서버 연결 오류', 'error');
    }
  }

  // =====================
  // 토스트
  // =====================
  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${type}`;
    setTimeout(() => t.className = 'toast', 2500);
  }

  init();
</script>
</body>
</html>
