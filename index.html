<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>얼리버드 이벤트 🐦</title>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;700;900&family=Noto+Sans+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131a;
    --border: #2a2a3a;
    --accent: #f0c040;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #777;
    --success: #4ade80;
    --fail: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh; display: flex;
    flex-direction: column; align-items: center;
    justify-content: center; padding: 24px 20px; overflow-x: hidden;
  }
  .bg-glow {
    position: fixed; top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(240,192,64,0.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
    animation: pulse 5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:.5; transform:translateX(-50%) scale(1); }
    50% { opacity:1; transform:translateX(-50%) scale(1.08); }
  }
  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 460px;
    display: flex; flex-direction: column; gap: 14px;
  }

  /* 헤더 */
  .header { text-align: center; padding: 8px 0 4px; }
  .tag {
    display: inline-block; background: var(--accent); color: #000;
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    padding: 4px 14px; border-radius: 20px; margin-bottom: 14px;
    text-transform: uppercase; font-family: 'Gothic A1', sans-serif;
  }
  .header h1 {
    font-family: 'Gothic A1', sans-serif; font-weight: 900;
    font-size: clamp(36px, 9vw, 56px);
    line-height: 1.1; letter-spacing: -1px; margin-bottom: 10px;
  }
  .header h1 span { color: var(--accent); }
  .header p { color: var(--muted); font-size: 14px; line-height: 1.7; }
  .header p strong { color: var(--accent); }

  /* 타이머 */
  .timer-bar {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px 22px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .timer-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .timer-value {
    font-family: 'Gothic A1', sans-serif; font-weight: 900;
    font-size: 30px; color: var(--accent); letter-spacing: 3px;
  }
  .status-wrap { text-align: right; }
  .status-text { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--success); box-shadow: 0 0 8px var(--success);
    margin-left: auto; animation: blink 1.5s ease-in-out infinite;
  }
  .status-dot.off { background: var(--fail); box-shadow: 0 0 8px var(--fail); animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* 슬롯 바 */
  .slots-bar {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px 22px;
  }
  .slots-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .slots-label { font-size: 12px; color: var(--muted); }
  .slots-count { font-family: 'Gothic A1', sans-serif; font-weight: 700; font-size: 20px; }
  .slots-count .n { color: var(--accent); font-size: 26px; }
  .slots-count .d { color: var(--muted); font-size: 14px; }
  .track { height: 7px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .6s ease; }

  /* 폼 */
  .form-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 26px 22px;
  }
  .form-card h2 {
    font-family: 'Gothic A1', sans-serif; font-weight: 700;
    font-size: 18px; margin-bottom: 20px;
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ig { margin-bottom: 14px; }
  .ig label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 7px; }
  .ig select, .ig input {
    width: 100%; background: var(--bg);
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 13px 14px; color: var(--text);
    font-size: 15px; font-family: 'Noto Sans KR', sans-serif;
    outline: none; transition: border-color .2s;
    -webkit-appearance: none; appearance: none;
  }
  .ig select:focus, .ig input:focus { border-color: var(--accent); }
  .ig select option { background: var(--card); }

  .submit-btn {
    width: 100%; background: var(--accent); color: #000; border: none;
    border-radius: 12px; padding: 16px;
    font-family: 'Gothic A1', sans-serif; font-weight: 700;
    font-size: 17px; cursor: pointer; transition: all .2s;
    letter-spacing: 1px; margin-top: 4px;
  }
  .submit-btn:hover:not(:disabled) { background: #f5d060; transform: translateY(-1px); }
  .submit-btn:active:not(:disabled) { transform: translateY(0); }
  .submit-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .spinner {
    display: inline-block; width: 15px; height: 15px;
    border: 2px solid #000; border-top-color: transparent;
    border-radius: 50%; animation: spin .6s linear infinite;
    margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 결과 */
  .result-screen {
    display: none; text-align: center;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 44px 24px;
  }
  .result-screen.show { display: block; animation: fadeUp .4s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .result-icon { font-size: 60px; margin-bottom: 14px; }
  .result-title { font-family: 'Gothic A1', sans-serif; font-weight: 900; font-size: 30px; margin-bottom: 10px; }
  .result-title.win { color: var(--accent); }
  .result-title.lose { color: var(--muted); }
  .result-rank {
    display: inline-block; background: var(--accent); color: #000;
    font-family: 'Gothic A1', sans-serif; font-weight: 900;
    font-size: 30px; padding: 10px 28px; border-radius: 12px; margin: 14px 0;
  }
  .result-msg { font-size: 14px; color: var(--muted); line-height: 1.8; }

  /* 관리자 */
  .admin-toggle { text-align: center; }
  .admin-toggle button {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-size: 12px; padding: 6px 18px; border-radius: 20px;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all .2s;
  }
  .admin-toggle button:hover { border-color: var(--accent); color: var(--accent); }
  .admin-panel {
    display: none; background: var(--card);
    border: 1.5px solid var(--accent); border-radius: 20px; padding: 24px;
  }
  .admin-panel.show { display: block; animation: fadeUp .3s ease; }
  .admin-panel h3 {
    font-family: 'Gothic A1', sans-serif; font-weight: 700;
    font-size: 15px; color: var(--accent); margin-bottom: 18px; letter-spacing: 1px;
  }
  .a-label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .a-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; color: var(--text);
    font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
    outline: none; margin-bottom: 12px;
  }
  .a-input:focus { border-color: var(--accent); }
  .a-btn {
    width: 100%; background: transparent; border: 1.5px solid var(--accent);
    color: var(--accent); border-radius: 10px; padding: 11px;
    font-family: 'Gothic A1', sans-serif; font-weight: 700;
    font-size: 14px; cursor: pointer; transition: all .2s; letter-spacing: 1px;
  }
  .a-btn:hover { background: var(--accent); color: #000; }
  .winner-list { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 16px; }
  .winner-list h4 { font-size: 11px; color: var(--muted); margin-bottom: 12px; letter-spacing: 1px; }
  .w-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .w-rank {
    background: var(--accent); color: #000;
    font-family: 'Gothic A1', sans-serif; font-weight: 700;
    font-size: 11px; padding: 2px 8px; border-radius: 6px; min-width: 34px; text-align: center;
  }
  .w-name { flex: 1; padding: 0 12px; font-weight: 600; }
  .w-info { color: var(--muted); font-size: 12px; }
  .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 20px 0; }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 11px 22px; border-radius: 12px;
    font-size: 14px; z-index: 999; transition: transform .3s ease; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok { border-color: var(--success); color: var(--success); }
  .toast.err { border-color: var(--fail); color: var(--fail); }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">

  <div class="header">
    <div class="tag">🐦 Early Bird</div>
    <h1>얼리버드<br><span>이벤트</span></h1>
    <p>QR코드를 발견했다면 지금 바로 참여하세요!<br>선착순 <strong id="hLimit">10</strong>명에게 <strong id="hPrize">구글플레이 상품권</strong> 증정</p>
  </div>

  <div class="timer-bar">
    <div>
      <div class="timer-label">마감까지</div>
      <div class="timer-value" id="timerVal">--:--</div>
    </div>
    <div class="status-wrap">
      <div class="status-text" id="statusTxt">로딩 중...</div>
      <div class="status-dot off" id="statusDot"></div>
    </div>
  </div>

  <div class="slots-bar">
    <div class="slots-top">
      <span class="slots-label">남은 당첨 자리</span>
      <div class="slots-count">
        <span class="n" id="remain">--</span>
        <span class="d"> / <span id="total">--</span>명</span>
      </div>
    </div>
    <div class="track"><div class="fill" id="fill" style="width:0%"></div></div>
  </div>

  <div class="form-card" id="formCard">
    <h2>🎯 지금 참여하기</h2>

    <div class="ig">
      <label>학과</label>
      <select id="dept">
        <option value="">학과 선택</option>
        <option>로봇기계시스템과</option>
        <option>기계과</option>
        <option>로봇소재융합과</option>
        <option>산업설비과</option>
        <option>반도체과</option>
        <option>자동차과</option>
        <option>전기과</option>
        <option>건축토목과</option>
      </select>
    </div>

    <div class="row2">
      <div class="ig">
        <label>학년</label>
        <select id="grade">
          <option value="">학년</option>
          <option value="1">1학년</option>
          <option value="2">2학년</option>
          <option value="3">3학년</option>
        </select>
      </div>
      <div class="ig">
        <label>반</label>
        <select id="cls">
          <option value="">반</option>
          <option value="1">1반</option>
          <option value="2">2반</option>
          <option value="3">3반</option>
        </select>
      </div>
    </div>

    <div class="row2">
      <div class="ig">
        <label>번호</label>
        <select id="num">
          <option value="">번호</option>
          <option value="1">1번</option><option value="2">2번</option>
          <option value="3">3번</option><option value="4">4번</option>
          <option value="5">5번</option><option value="6">6번</option>
          <option value="7">7번</option><option value="8">8번</option>
          <option value="9">9번</option><option value="10">10번</option>
          <option value="11">11번</option><option value="12">12번</option>
          <option value="13">13번</option><option value="14">14번</option>
          <option value="15">15번</option><option value="16">16번</option>
          <option value="17">17번</option><option value="18">18번</option>
          <option value="19">19번</option><option value="20">20번</option>
          <option value="21">21번</option><option value="22">22번</option>
          <option value="23">23번</option><option value="24">24번</option>
          <option value="25">25번</option>
        </select>
      </div>
      <div class="ig">
        <label>이름</label>
        <input type="text" id="name" placeholder="이름 입력">
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="doSubmit()" disabled>로딩 중...</button>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-icon" id="rIcon"></div>
    <div class="result-title" id="rTitle"></div>
    <div id="rRank"></div>
    <div class="result-msg" id="rMsg"></div>
  </div>

  <div class="admin-toggle">
    <button onclick="toggleAdmin()">⚙️ 관리자</button>
  </div>

  <div class="admin-panel" id="adminPanel">
    <h3>⚙ 관리자 패널</h3>
    <label class="a-label">관리자 비밀번호</label>
    <input type="password" id="adminPw" class="a-input" placeholder="비밀번호 입력 후 명단 조회">
    <button class="a-btn" onclick="loadWinners()">당첨자 명단 불러오기</button>
    <div style="margin-top:14px;padding:12px;background:var(--bg);border-radius:10px;font-size:12px;color:var(--muted);line-height:1.8;">
      ⚙️ 시간·인원·상품 변경은 Apps Script 상단 <strong style="color:var(--accent)">CONFIG</strong> 수정 후 배포 관리에서 재배포
    </div>
    <div class="winner-list">
      <h4>🏆 당첨자 명단</h4>
      <div id="winnerList"><div class="empty">비밀번호 입력 후 조회하세요</div></div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
  // =============================================
  // Apps Script URL (변경 시 여기만 수정)
  // =============================================
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-Gy1XeVbPBjw4zglLj__QpBJDjXTJQ8wSnD6_-1Db74fs0dO05sOMCG9qioJdt188/exec';

  let status = null;
  let qrCode = null;  // URL에서 읽은 QR코드

  async function init() {
    // URL 파라미터에서 QR코드 추출
    const params = new URLSearchParams(window.location.search);
    qrCode = params.get('code');

    if (!qrCode) {
      showQRError('QR코드를 통해 접속해주세요');
      return;
    }

    // QR코드 유효성 확인
    try {
      const res  = await fetch(`${SCRIPT_URL}?action=checkQR&code=${enc(qrCode)}`);
      const data = await res.json();
      if (!data.ok) {
        showQRError(data.message || '유효하지 않은 QR코드입니다');
        return;
      }
    } catch(e) {
      showQRError('서버 연결 오류. 잠시 후 다시 시도해주세요');
      return;
    }

    await fetchStatus();
    setInterval(fetchStatus, 10000);
    setInterval(tickTimer, 1000);
  }

  function showQRError(msg) {
    document.getElementById('formCard').innerHTML = `
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:48px;margin-bottom:16px">🚫</div>
        <div style="font-family:'Gothic A1',sans-serif;font-weight:700;font-size:18px;margin-bottom:10px;color:var(--fail)">${msg}</div>
        <div style="font-size:13px;color:var(--muted);line-height:1.8">포스터의 QR코드를 다시 스캔해주세요</div>
      </div>
    `;
    document.getElementById('submitBtn') && (document.getElementById('submitBtn').style.display='none');
  }

  async function fetchStatus() {
    try {
      const res  = await fetch(`${SCRIPT_URL}?action=status`);
      const data = await res.json();
      if (data.ok) { status = data; updateUI(); }
    } catch(e) {
      document.getElementById('statusTxt').textContent = '연결 오류';
    }
  }

  function updateUI() {
    if (!status) return;
    document.getElementById('hLimit').textContent = status.limit;
    document.getElementById('hPrize').textContent = status.prize;
    document.getElementById('remain').textContent = status.remain;
    document.getElementById('total').textContent  = status.limit;
    const pct = ((status.limit - status.remain) / status.limit) * 100;
    document.getElementById('fill').style.width = pct + '%';
    const btn = document.getElementById('submitBtn');
    if (status.over) {
      btn.disabled = true; btn.textContent = '이벤트가 종료되었습니다';
    } else if (!status.active) {
      btn.disabled = true; btn.textContent = `${status.startTime} 시작 예정`;
    } else if (status.remain <= 0) {
      btn.disabled = true; btn.textContent = '선착순 마감!';
    } else {
      btn.disabled = false; btn.textContent = '참여하기 →';
    }
  }

  function tickTimer() {
    if (!status) return;
    const now   = new Date();
    const start = toD(status.startTime);
    const end   = toD(status.endTime);
    const dot   = document.getElementById('statusDot');
    const txt   = document.getElementById('statusTxt');
    const val   = document.getElementById('timerVal');
    if (now < start) {
      val.textContent = fmt(start - now); txt.textContent = '시작 전'; dot.className = 'status-dot off';
    } else if (now <= end) {
      val.textContent = fmt(end - now); txt.textContent = '진행 중!'; dot.className = 'status-dot';
    } else {
      val.textContent = '00:00'; txt.textContent = '종료'; dot.className = 'status-dot off';
    }
  }

  function toD(t) {
    const [h,m] = t.split(':').map(Number);
    const d = new Date(); d.setHours(h,m,0,0); return d;
  }
  function fmt(ms) {
    const m = Math.floor(ms/60000), s = Math.floor((ms%60000)/1000);
    return `${pad(m)}:${pad(s)}`;
  }
  function pad(n) { return String(n).padStart(2,'0'); }

  async function doSubmit() {
    const dept  = document.getElementById('dept').value;
    const grade = document.getElementById('grade').value;
    const cls   = document.getElementById('cls').value;
    const num   = document.getElementById('num').value;
    const name  = document.getElementById('name').value.trim();
    if (!dept || !grade || !cls || !num || !name) { toast('모든 항목을 입력해주세요', 'err'); return; }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>처리 중...';
    try {
      const url  = `${SCRIPT_URL}?action=join&code=${enc(qrCode)}&dept=${enc(dept)}&grade=${grade}&cls=${cls}&num=${num}&name=${enc(name)}`;
      const res  = await fetch(url);
      const data = await res.json();
      if (data.ok) {
        document.getElementById('formCard').style.display = 'none';
        showResult(true, data.rank, data.name, data.prize);
        fetchStatus();
      } else if (data.error === 'FULL') {
        document.getElementById('formCard').style.display = 'none';
        showResult(false);
      } else if (data.error === 'USED') {
        showQRError('이미 다른 학생이 사용한 QR코드입니다');
      } else if (data.error === 'DUPLICATE') {
        toast('이미 참여한 학생이에요!', 'err');
        btn.disabled = false; btn.textContent = '참여하기 →';
      } else {
        toast(data.message || data.error, 'err');
        btn.disabled = false; btn.textContent = '참여하기 →';
      }
    } catch(e) {
      toast('서버 오류. 다시 시도해주세요', 'err');
      btn.disabled = false; btn.textContent = '참여하기 →';
    }
  }

  function showResult(won, rank, name, prize) {
    document.getElementById('resultScreen').classList.add('show');
    if (won) {
      document.getElementById('rIcon').textContent  = '🎉';
      document.getElementById('rTitle').textContent = '당첨!';
      document.getElementById('rTitle').className   = 'result-title win';
      document.getElementById('rRank').innerHTML    = `<div class="result-rank">${rank}등 🏆</div>`;
      document.getElementById('rMsg').innerHTML     = `
        <strong style="color:var(--text)">${name}</strong> 학생, 축하해요!<br>
        <strong style="color:var(--accent)">${prize}</strong>에 당첨되었습니다.<br><br>
        📱 담당 선생님에게 이 화면을 보여주세요!
      `;
    } else {
      document.getElementById('rIcon').textContent  = '😢';
      document.getElementById('rTitle').textContent = '아쉽게도 마감!';
      document.getElementById('rTitle').className   = 'result-title lose';
      document.getElementById('rRank').innerHTML    = '';
      document.getElementById('rMsg').innerHTML     = `
        선착순이 모두 마감됐어요.<br>다음 이벤트를 기대해주세요!<br><br>
        <span style="color:var(--accent)">🌅 일찍 올수록 찬스가 커져요</span>
      `;
    }
  }

  function toggleAdmin() {
    document.getElementById('adminPanel').classList.toggle('show');
  }

  async function loadWinners() {
    const pw = document.getElementById('adminPw').value;
    if (!pw) { toast('비밀번호를 입력해주세요', 'err'); return; }
    const el = document.getElementById('winnerList');
    el.innerHTML = '<div class="empty">불러오는 중...</div>';
    try {
      const res  = await fetch(`${SCRIPT_URL}?action=winners&pw=${enc(pw)}`);
      const data = await res.json();
      if (!data.ok) { toast(data.error, 'err'); el.innerHTML = '<div class="empty">조회 실패</div>'; return; }
      if (!data.winners.length) { el.innerHTML = '<div class="empty">아직 당첨자가 없습니다</div>'; return; }
      el.innerHTML = data.winners.map(w => `
        <div class="w-item">
          <span class="w-rank">${w.rank}등</span>
          <span class="w-name">${w.name}</span>
          <span class="w-info">${w.dept} ${w.grade}학년 ${w.cls}반 ${w.num}번</span>
        </div>
      `).join('');
    } catch(e) { toast('서버 연결 오류', 'err'); }
  }

  function enc(v) { return encodeURIComponent(v); }
  function toast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${type}`;
    setTimeout(() => t.className = 'toast', 2500);
  }

  init();
</script>
</body>
</html>
